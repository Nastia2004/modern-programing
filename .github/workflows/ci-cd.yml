name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  backend:
    name: Backend tests and coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lab2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: lab2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Unit and integration tests
        run: npm test

      - name: Coverage
        run: npm run coverage

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: lab2-coverage
          path: lab2/coverage

  frontend:
    name: Frontend tests, build and scraping
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lab3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: lab3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Coverage
        run: npm run coverage

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start backend for scraping
        working-directory: lab2
        run: |
          npm ci
          PORT=3000 npm start > /tmp/lab2.log 2>&1 &

      - name: Start frontend for scraping
        run: |
          VITE_API_URL=http://127.0.0.1:3000 npm run dev -- --host 127.0.0.1 --port 5173 > /tmp/lab3.log 2>&1 &

      - name: Wait for local services
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:3000/ >/dev/null && curl -fsS http://127.0.0.1:5173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/lab2.log || true
          cat /tmp/lab3.log || true
          exit 1

      - name: Playwright scraping scenario
        run: FRONTEND_URL=http://127.0.0.1:5173 npm run scrape

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: lab3-coverage
          path: lab3/coverage

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t lab2-backend:ci ./lab2

      - name: Build frontend Docker image
        run: docker build -t lab3-frontend:ci ./lab3

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs:
      - docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    env:
      RENDER_DEPLOY_HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
      RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
    steps:
      - name: Trigger Render deploy hooks if configured
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_BACKEND" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_BACKEND"
          else
            echo "RENDER_DEPLOY_HOOK_BACKEND is not configured. Render Blueprint autoDeployTrigger=checksPass can deploy instead."
          fi

          if [ -n "$RENDER_DEPLOY_HOOK_FRONTEND" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_FRONTEND"
          else
            echo "RENDER_DEPLOY_HOOK_FRONTEND is not configured. Render Blueprint autoDeployTrigger=checksPass can deploy instead."
          fi
